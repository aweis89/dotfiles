#!/usr/bin/env -S PATH=/usr/bin:/bin:/opt/homebrew/bin:/usr/local/bin python3
# chezmoi modify_ script for ~/.codex/config.toml.
#
# Reads the live config from stdin, enforces the managed top-level fields Codex
# does not own, and writes the merged result to stdout. Everything Codex writes
# itself (project trust entries, model auto-migrations, mcp_servers, NUX
# counters, profiles, features, etc.) passes through untouched.
#
# Uses vendored tomlkit for a real AST round-trip: set-key semantics make the
# managed fields idempotent (no duplicate-key risk from quoting drift) and
# Codex's comments / ordering / formatting are preserved.

import os
import sys

_SOURCE_DIR = os.environ.get("CHEZMOI_SOURCE_DIR") or os.path.dirname(
    os.path.dirname(os.path.abspath(__file__))
)
sys.path.insert(0, os.path.join(_SOURCE_DIR, ".chezmoi-helpers"))

import tomlkit  # noqa: E402
from tomlkit import array, string, table  # noqa: E402


DEVELOPER_INSTRUCTIONS = """\
For any git branch, commit message, or pull request title you create or suggest, use semantic naming.

Commit messages and pull request titles must use conventional commit format:
- `type(scope): summary`
- `type: summary`

Use lowercase types and an imperative summary. Prefer these types: `feat`, `fix`, `refactor`, `docs`, `test`, `chore`, `ci`, `build`, `perf`, `revert`.

Branch names must use this format:
- `<type>/<short-kebab-summary>`
- optionally include a ticket or scope inside the kebab summary when useful

Examples:
- `feat/add-semantic-branch-naming`
- `fix/helm-template-rendering`
- `chore/update-codex-config`

Never use personal or tool prefixes such as `codex/`, `aw/`, `aaron/`, or similar.

For GitHub operations, prefer the GitHub CLI `gh` when possible. Use `gh` for pull requests, reviews, issues, checks, releases, and other GitHub workflows instead of manual browser steps or lower-level alternatives unless `gh` cannot do the task.

Never add agent or tool attribution to commit messages or pull request bodies. Do not append trailers like `Co-authored-by: Codex`, do not include `Generated with Codex` / `Generated with OpenAI Codex` footers, and do not add any equivalent attribution for yourself or any other AI tool.
"""

PROXY_EXCLUDE = [
    "HTTPS_PROXY",
    "HTTP_PROXY",
    "ALL_PROXY",
    "NO_PROXY",
    "https_proxy",
    "http_proxy",
    "all_proxy",
    "no_proxy",
    "WS_PROXY",
    "WSS_PROXY",
    "ws_proxy",
    "wss_proxy",
]


def shell_environment_policy():
    t = table()
    t.add("inherit", "all")
    excludes = array()
    excludes.multiline(True)
    for name in PROXY_EXCLUDE:
        excludes.append(name)
    t.add("exclude", excludes)
    return t


def openrouter_provider():
    t = table()
    t.add("name", "OpenRouter")
    t.add("base_url", "https://openrouter.ai/api/v1")
    t.add("env_key", "OPENROUTER_API_KEY")
    t.add(
        "env_key_instructions",
        "Set OPENROUTER_API_KEY in your shell environment before starting Codex.",
    )
    return t


def main() -> None:
    content = sys.stdin.read()
    doc = tomlkit.parse(content) if content.strip() else tomlkit.document()

    # developer_instructions: top-level multiline string. Set-key replace.
    doc["developer_instructions"] = string(DEVELOPER_INSTRUCTIONS, multiline=True)

    # [shell_environment_policy]
    doc["shell_environment_policy"] = shell_environment_policy()

    # [model_providers.openrouter]
    providers = doc.get("model_providers")
    if not isinstance(providers, dict):
        providers = table()
        doc["model_providers"] = providers
    providers["openrouter"] = openrouter_provider()

    # Guarantee a trailing newline.
    out = tomlkit.dumps(doc)
    if not out.endswith("\n"):
        out += "\n"
    sys.stdout.write(out)


if __name__ == "__main__":
    main()
