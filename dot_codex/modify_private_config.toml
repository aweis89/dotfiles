#!/usr/bin/env python3
# chezmoi modify_ script: reads ~/.codex/config.toml from stdin and writes
# the new desired content to stdout. Enforces the top-level
# `developer_instructions` block and the Codex shell environment policy.
# Codex's own writes (project trust entries, model auto-migrations,
# mcp_servers, NUX counters, etc.) pass through unchanged.

import re
import sys

DEVELOPER_INSTRUCTIONS = '''\
developer_instructions = """
For any git branch, commit message, or pull request title you create or suggest, use semantic naming.

Commit messages and pull request titles must use conventional commit format:
- `type(scope): summary`
- `type: summary`

Use lowercase types and an imperative summary. Prefer these types: `feat`, `fix`, `refactor`, `docs`, `test`, `chore`, `ci`, `build`, `perf`, `revert`.

Branch names must use this format:
- `<type>/<short-kebab-summary>`
- optionally include a ticket or scope inside the kebab summary when useful

Examples:
- `feat/add-semantic-branch-naming`
- `fix/helm-template-rendering`
- `chore/update-codex-config`

Never use personal or tool prefixes such as `codex/`, `aw/`, `aaron/`, or similar.

For GitHub operations, prefer the GitHub CLI `gh` when possible. Use `gh` for pull requests, reviews, issues, checks, releases, and other GitHub workflows instead of manual browser steps or lower-level alternatives unless `gh` cannot do the task.

Never add agent or tool attribution to commit messages or pull request bodies. Do not append trailers like `Co-authored-by: Codex`, do not include `Generated with Codex` / `Generated with OpenAI Codex` footers, and do not add any equivalent attribution for yourself or any other AI tool.
"""
'''

SHELL_ENVIRONMENT_POLICY = '''\
[shell_environment_policy]
inherit = "all"
exclude = [
  "HTTPS_PROXY",
  "HTTP_PROXY",
  "ALL_PROXY",
  "NO_PROXY",
  "https_proxy",
  "http_proxy",
  "all_proxy",
  "no_proxy",
  "WS_PROXY",
  "WSS_PROXY",
  "ws_proxy",
  "wss_proxy",
]
'''

DI_PATTERN = re.compile(
    r'^developer_instructions\s*=\s*"""[\s\S]*?"""\n',
    re.MULTILINE,
)

SEP_PATTERN = re.compile(
    r'^\[shell_environment_policy\]\n[\s\S]*?(?=^\[|\Z)',
    re.MULTILINE,
)

FEATURES_PATTERN = re.compile(
    r'^(\[features\]\n)([\s\S]*?)(?=^\[|\Z)',
    re.MULTILINE,
)


def migrate_feature_flags(content: str) -> str:
    def replace_features(match: re.Match[str]) -> str:
        header, body = match.groups()
        has_hooks = re.search(r'^\s*hooks\s*=', body, re.MULTILINE) is not None
        lines = []

        for line in body.splitlines(keepends=True):
            codex_hooks = re.match(r'^(\s*)codex_hooks\s*=', line)
            if not codex_hooks:
                lines.append(line)
                continue

            if has_hooks:
                continue

            lines.append(f'{codex_hooks.group(1)}hooks =' + line.split('=', 1)[1])
            has_hooks = True

        return header + ''.join(lines)

    return FEATURES_PATTERN.sub(replace_features, content, count=1)


content = sys.stdin.read()
if DI_PATTERN.search(content):
    output = DI_PATTERN.sub(lambda _: DEVELOPER_INSTRUCTIONS, content, count=1)
elif content.strip():
    output = DEVELOPER_INSTRUCTIONS + '\n' + content.lstrip('\n')
else:
    output = DEVELOPER_INSTRUCTIONS

output = migrate_feature_flags(output)

if SEP_PATTERN.search(output):
    output = SEP_PATTERN.sub(lambda _: SHELL_ENVIRONMENT_POLICY + '\n', output, count=1)
else:
    output = output.rstrip() + '\n\n' + SHELL_ENVIRONMENT_POLICY

sys.stdout.write(output)
